volumes:
  n8nData: {}

networks:
  yoganetwork:
    driver: bridge

services:
  n8n:
    image: n8nio/n8n
    container_name: app_n8n
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.n8n.entrypoints=websecure
      - traefik.http.routers.n8n.rule=Host(`n8n.example.fr`)
      - traefik.http.routers.n8n.tls=true
      - traefik.http.routers.n8n.tls.certresolver=production
      - traefik.http.services.n8n-service.loadbalancer.server.port=5678
      - traefik.http.middlewares.n8n.headers.browserXSSFilter=true
      - traefik.http.middlewares.n8n.headers.contentTypeNosniff=true
      - traefik.http.middlewares.n8n-headers.headers.customrequestheaders.Origin=https://n8n.example.fr
      - traefik.http.middlewares.n8n-headers.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.routers.n8n.middlewares=n8n-headers@docker
    env_file:
      - ./infrastructure/docker/env/automation.env
    ports:
      - "5678:5678"
    depends_on:
      - redis
    volumes:
      - n8nData:/home/node/.n8n
    networks:
      - yoganetwork

  redis:
    image: redis:alpine
    container_name: app_redis
    restart: unless-stopped
    networks:
      - yoganetwork

  pdfapi:
    build: services/pdfapi
    container_name: app_pdfapi
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.pdfapi.entrypoints=websecure
      - traefik.http.routers.pdfapi.rule=Host(`pdfapi.example.fr`)
      - traefik.http.routers.pdfapi.tls=true
      - traefik.http.routers.pdfapi.tls.certresolver=production
      - traefik.http.services.pdfapi-service.loadbalancer.server.port=3000
    depends_on:
      - redis
    env_file:
      - ./infrastructure/docker/env/fastmcp.env
    networks:
      - yoganetwork
